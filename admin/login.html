<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Login — Matchaji Roadshow</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-main);">

<div style="width:100%;max-width:400px;padding:1.5rem;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:3rem;margin-bottom:0.5rem;">🍵</div>
    <h1 style="font-size:1.75rem;">Matchaji Roadshow Admin</h1>
    <p class="text-sm text-muted">Selamat datang! Silakan masuk ke panel admin.</p>
  </div>

  <div class="card" style="padding:2rem;">
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="login-user" class="form-control" placeholder="Masukkan username" required autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="form-label">Password</label>
        <input type="password" id="login-pass" class="form-control" placeholder="Masukkan password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">Masuk ke Dashboard</button>
    </form>
    
    <div style="margin-top:1.5rem;padding:1rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;">
      <div class="text-xs text-muted mb-1">Kredensial Demo:</div>
      <div class="font-semibold text-sm" style="color:var(--violet-light);">Username: admin<br>Password: admin123</div>
    </div>
  </div>
  
  <div style="text-align:center;margin-top:1.5rem;">
    <a href="../index.html" class="btn btn-ghost btn-sm">← Kembali ke Website</a>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/app.js"></script>
<script>
  // Cek jika sudah login
  if (localStorage.getItem('evtreg_admin_auth') === 'true') {
    window.location.replace('index.html');
  }

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';

    // Simulasi loading sebentar agar terasa interaktif
    setTimeout(() => {
      if (u === 'admin' && p === 'admin123') {
        localStorage.setItem('evtreg_admin_auth', 'true');
        showToast('Login berhasil!', 'success');
        setTimeout(() => window.location.replace('index.html'), 800);
      } else {
        showToast('Username atau password salah', 'error');
        btn.disabled = false;
        btn.textContent = 'Masuk ke Dashboard';
        document.getElementById('login-pass').value = '';
      }
    }, 600);
  });
</script>
</body>
</html>
