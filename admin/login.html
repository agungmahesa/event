<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Login — Matchaji Roadshow</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-main);">

<div style="width:100%;max-width:400px;padding:1.5rem;">
  <div style="text-align:center;margin-bottom:2rem;">
    <img src="../img/logo.png" alt="Matchaji" style="height:56px;margin-bottom:0.75rem;" onerror="this.style.display='none'">
    <h1 style="font-size:1.75rem;">Matchaji Roadshow Admin</h1>
    <p class="text-sm text-muted">Selamat datang! Silakan masuk ke panel admin.</p>
  </div>

  <div class="card" style="padding:2rem;">
    <div id="login-error" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius-md);padding:0.75rem 1rem;margin-bottom:1rem;font-size:0.85rem;color:var(--red);">
      ❌ <span id="login-error-msg">Email atau password salah</span>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Admin</label>
        <input type="email" id="login-email" class="form-control" placeholder="admin@matchaji.id" required autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="form-label">Password</label>
        <input type="password" id="login-pass" class="form-control" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="btn-login">Masuk ke Dashboard</button>
    </form>
  </div>

  <div style="text-align:center;margin-top:1.5rem;">
    <a href="/" class="btn btn-ghost btn-sm">← Kembali ke Website</a>
  </div>
</div>

<div id="toast-container"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ---- Inisialisasi Supabase langsung (standalone, tanpa app.js) ----
  const SUPA_URL = 'https://vzdpvomzejaulahohyce.supabase.co';
  const SUPA_KEY = 'sb_publishable_osvY0dcqVEts9e4X3CclZA_Cr12kwJ1';

  let _db = null;
  try {
    // CDN mengekspos window.supabase = { createClient, ... }
    _db = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch (err) {
    console.error('Supabase init error:', err);
  }

  // ---- Minimal toast ----
  function showToast(message, type = 'info') {
    let container = document.getElementById('toast-container');
    const icons = { success: '✅', error: '❌', info: '💡' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type] || '💬'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }

  function showError(msg) {
    const box = document.getElementById('login-error');
    document.getElementById('login-error-msg').textContent = msg;
    box.style.display = 'block';
  }

  // ---- Redirect jika sudah punya session aktif ----
  (async () => {
    if (!_db) return;
    try {
      const { data: { session } } = await _db.auth.getSession();
      if (session) window.location.replace('/admin');
    } catch (_) {}
  })();

  // ---- Form Submit ----
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('btn-login');

    document.getElementById('login-error').style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';

    if (!_db) {
      showError('Koneksi ke server gagal. Periksa koneksi internet Anda.');
      btn.disabled = false;
      btn.textContent = 'Masuk ke Dashboard';
      return;
    }

    try {
      const { data, error } = await _db.auth.signInWithPassword({ email, password: pass });

      if (error) {
        const isWrongCred = error.message?.toLowerCase().includes('invalid') 
                         || error.status === 400;
        showError(isWrongCred ? 'Email atau password salah.' : error.message);
        btn.disabled = false;
        btn.textContent = 'Masuk ke Dashboard';
        document.getElementById('login-pass').value = '';
        return;
      }

      showToast('Login berhasil! Mengalihkan...', 'success');
      setTimeout(() => window.location.replace('/admin'), 800);

    } catch (err) {
      showError(err.message || 'Terjadi kesalahan. Coba lagi.');
      btn.disabled = false;
      btn.textContent = 'Masuk ke Dashboard';
    }
  });
</script>

</body>
</html>
