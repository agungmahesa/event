<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daftar Peserta — Matchaji Roadshow Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-layout">
  <nav class="sidebar">
    <div class="sidebar-logo" style="padding:0;">
      <img src="../img/logo.png" alt="Matchaji" style="height:32px;">
    </div>
    <div class="sidebar-section-label">Menu</div>
    <a class="sidebar-link" href="/admin"><span class="icon">📊</span> Dashboard</a>
    <a class="sidebar-link" href="/admin/events"><span class="icon">📅</span> Kelola Event</a>
    <a class="sidebar-link active" href="/admin/registrants"><span class="icon">👥</span> Peserta</a>
    <a class="sidebar-link" href="/admin/checkin"><span class="icon">📷</span> QR Check-in</a>
    <a class="sidebar-link" href="/admin/settings"><span class="icon">⚙️</span> Pengaturan</a>
    <div class="sidebar-section-label" style="margin-top:auto;">Lainnya</div>
    <a class="sidebar-link" href="/"><span class="icon">🌐</span> Website</a>
    <a class="sidebar-link" href="/register"><span class="icon">📋</span> Form Daftar</a>
    <a class="sidebar-link" href="#" onclick="adminLogout(); return false;" style="color:var(--red);"><span class="icon">🚪</span> Logout</a>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <h1>Daftar Peserta</h1>
          <p class="text-sm text-muted" id="reg-count-label">Memuat data...</p>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="exportCSV(document.getElementById('filter-event').value)">⬇️ Export CSV</button>
        </div>
      </div>
    </div>

    <div class="page-body">

      <!-- FILTERS -->
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem;">
        <div class="search-bar" style="flex:1;min-width:200px;">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-q" class="form-control" placeholder="Cari nama, email, ID..." oninput="applyFilters()">
        </div>
        <select class="form-control" id="filter-event" onchange="applyFilters()" style="width:auto;max-width:220px;font-size:0.85rem;">
          <option value="">Semua Event</option>
        </select>
        <select class="form-control" id="filter-payment" onchange="applyFilters()" style="width:auto;font-size:0.85rem;">
          <option value="">Semua Status</option>
          <option value="pending">⏳ Pending</option>
          <option value="approved">✅ Approved</option>
          <option value="free">🎁 Gratis</option>
          <option value="rejected">🚫 Ditolak</option>
        </select>
        <select class="form-control" id="filter-checkin" onchange="applyFilters()" style="width:auto;font-size:0.85rem;">
          <option value="">Semua Check-in</option>
          <option value="yes">✓ Sudah</option>
          <option value="no">⏳ Belum</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID / Tanggal</th>
              <th>Peserta</th>
              <th>Event</th>
              <th>Tiket</th>
              <th>Pembayaran</th>
              <th>Bukti</th>
              <th>Check-in</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="reg-tbody">
            <tr><td colspan="8" class="text-center text-muted" style="padding:3rem;">Memuat...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:1rem;flex-wrap:wrap;gap:0.75rem;">
        <div class="text-sm text-muted" id="pagination-info">—</div>
        <div style="display:flex;gap:0.4rem;" id="pagination-btns"></div>
      </div>

    </div>
  </div>
</div>

<!-- PROOF LIGHTBOX MODAL -->
<div class="modal-overlay" id="proof-modal-overlay" onclick="closeProofModal()">
  <div class="modal" style="max-width:500px;text-align:center;" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h4>📎 Bukti Pembayaran</h4>
      <button class="modal-close" onclick="closeProofModal()">✕</button>
    </div>
    <div id="proof-modal-content"></div>
    <div style="margin-top:1rem;display:flex;gap:0.75rem;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeProofModal()">Tutup</button>
      <button class="btn btn-success" style="flex:1;" id="proof-approve-btn">✅ Approve</button>
      <button class="btn btn-danger btn-sm" id="proof-reject-btn">🚫 Tolak</button>
    </div>
  </div>
</div>

<!-- REJECT MODAL -->
<div class="modal-overlay" id="reject-modal-overlay">
  <div class="modal" style="max-width:400px;">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h4>Tolak Pembayaran</h4>
      <button class="modal-close" onclick="closeRejectModal()">✕</button>
    </div>
    <input type="hidden" id="reject-reg-id">
    <div class="form-group">
      <label class="form-label" for="reject-reason">Alasan (opsional)</label>
      <textarea id="reject-reason" class="form-control" rows="3" placeholder="Mis: Bukti transfer tidak sesuai, nominal kurang, dll."></textarea>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeRejectModal()">Batal</button>
      <button class="btn btn-danger" style="flex:1;" onclick="confirmReject()">🚫 Tolak</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="bottom-nav-item" href="/admin"><span class="nav-icon">📊</span><span>Dashboard</span></a>
  <a class="bottom-nav-item" href="/admin/events"><span class="nav-icon">📅</span><span>Event</span></a>
  <a class="bottom-nav-item active" href="/admin/registrants"><span class="nav-icon">👥</span><span>Peserta</span></a>
  <a class="bottom-nav-item" href="/admin/checkin"><span class="nav-icon">📷</span><span>Check-in</span></a>
</nav>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/admin.js"></script>
<script>
  const PAGE_SIZE = 20;
  let currentPage = 1;
  let filteredRegs = [];

  async function initFilters() {
    const events = await DB.getEvents();
    const sel = document.getElementById('filter-event');
    sel.innerHTML = '<option value="">Semua Event</option>' +
      events.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
  }

  async function applyFilters() {
    const q = document.getElementById('search-q').value.toLowerCase().trim();
    const evId = document.getElementById('filter-event').value;
    const pay = document.getElementById('filter-payment').value;
    const ci = document.getElementById('filter-checkin').value;

    let regs = await DB.getRegistrants();
    if (q) regs = regs.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.email.toLowerCase().includes(q) ||
      r.id.toLowerCase().includes(q) ||
      (r.phone || '').includes(q)
    );
    if (evId) regs = regs.filter(r => r.eventId === evId);
    if (pay) regs = regs.filter(r => r.paymentStatus === pay);
    if (ci === 'yes') regs = regs.filter(r => r.checkedIn);
    if (ci === 'no') regs = regs.filter(r => !r.checkedIn);

    filteredRegs = regs.sort((a, b) => new Date(b.createdAt || b.registeredAt) - new Date(a.createdAt || a.registeredAt));
    currentPage = 1;
    await renderTable();
  }

  async function renderTable() {
    const tbody = document.getElementById('reg-tbody');
    const total = filteredRegs.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageRegs = filteredRegs.slice(start, start + PAGE_SIZE);

    document.getElementById('reg-count-label').textContent = `${total} peserta ditemukan`;
    document.getElementById('pagination-info').textContent = `Halaman ${currentPage} dari ${totalPages} (${total} total)`;

    const events = await DB.getEvents();
    const payBadge = {
      pending:  `<span class="badge badge-amber" style="font-size:0.68rem;">⏳ Pending</span>`,
      approved: `<span class="badge badge-green" style="font-size:0.68rem;">✅ Approved</span>`,
      free:     `<span class="badge badge-green" style="font-size:0.68rem;">🎁 Gratis</span>`,
      rejected: `<span class="badge badge-red" style="font-size:0.68rem;">🚫 Ditolak</span>`,
    };

    if (!pageRegs.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted" style="padding:3rem;">Tidak ada data peserta</td></tr>`;
    } else {
      tbody.innerHTML = pageRegs.map(r => {
        const ev = events.find(e => e.id === r.eventId);
        const hasProof = !!r.paymentProof;
        const approveBtn = r.paymentStatus === 'pending'
          ? `<button class="btn btn-success btn-sm" onclick="approvePayment('${r.id}')" style="height:30px;padding:0 0.5rem;font-size:0.72rem;">✅</button>`
          : '';
        return `<tr>
          <td>
            <div class="badge badge-violet" style="font-size:0.65rem;margin-bottom:0.2rem;">${r.id}</div>
            <div class="text-xs text-muted">${formatDateTime(r.registeredAt)}</div>
          </td>
          <td>
            <div class="font-semibold text-sm">${r.name}</div>
            <div class="text-xs text-muted">${r.email}</div>
            <div class="text-xs text-muted">${r.phone || ''}</div>
          </td>
          <td class="text-sm text-muted" style="max-width:130px;white-space:normal;line-height:1.3;">${ev ? ev.name.substring(0, 30) + '…' : '-'}</td>
          <td class="text-sm">${r.ticketType}<br><span class="text-xs text-muted">${r.ticketPrice === 0 ? 'Gratis' : formatCurrency(r.ticketPrice)}</span></td>
          <td>${payBadge[r.paymentStatus] || payBadge.pending}</td>
          <td style="text-align:center;">
            ${hasProof
              ? `<button class="btn btn-ghost btn-sm" onclick="viewProof('${r.id}')" style="height:30px;padding:0 0.5rem;font-size:0.72rem;">📎 Lihat</button>`
              : `<span class="text-muted" style="font-size:0.72rem;">—</span>`}
          </td>
          <td>
            ${r.checkedIn
              ? `<span class="badge badge-green" style="font-size:0.68rem;">✓ In<br><span style="font-weight:400;opacity:0.7;">${formatDateTime(r.checkedInAt)}</span></span>`
              : `<span class="badge badge-gray" style="font-size:0.68rem;">– Belum</span>`}
          </td>
          <td>
            <div style="display:flex;gap:0.3rem;flex-wrap:wrap;">
              ${approveBtn}
              <button class="btn btn-ghost btn-sm" onclick="openRejectModal('${r.id}')" style="height:30px;padding:0 0.5rem;font-size:0.72rem;">🚫</button>
              <a href="/ticket?id=${r.id}" target="_blank" class="btn btn-ghost btn-sm" style="height:30px;padding:0 0.5rem;font-size:0.72rem;">🍵</a>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const container = document.getElementById('pagination-btns');
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<button class="btn btn-ghost btn-sm" onclick="goPage(${currentPage - 1})">‹ Prev</button>`;
    const start = Math.max(1, currentPage - 2);
    const end = Math.min(totalPages, currentPage + 2);
    for (let i = start; i <= end; i++) {
      html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-ghost'} btn-sm" onclick="goPage(${i})">${i}</button>`;
    }
    if (currentPage < totalPages) html += `<button class="btn btn-ghost btn-sm" onclick="goPage(${currentPage + 1})">Next ›</button>`;
    container.innerHTML = html;
  }

  function goPage(page) { currentPage = page; renderTable(); window.scrollTo({top: 0, behavior: 'smooth'}); }

  // Proof modal
  let proofViewRegId = null;
  async function viewProof(regId) {
    const reg = await DB.getRegistrant(regId);
    if (!reg?.paymentProof) return;
    proofViewRegId = regId;
    document.getElementById('proof-modal-content').innerHTML = `
      <img src="${reg.paymentProof}" style="max-width:100%;max-height:60vh;border-radius:var(--radius-md);object-fit:contain;cursor:zoom-in;" onclick="window.open(this.src,'_blank')">
      <div class="text-xs text-muted mt-1" style="margin-bottom:0.5rem;">Peserta: ${reg.name} · ID: ${reg.id}</div>
      <div class="text-xs text-muted">Upload: ${formatDateTime(reg.paymentProofAt)}</div>`;
    document.getElementById('proof-approve-btn').onclick = () => { approvePayment(regId); closeProofModal(); };
    document.getElementById('proof-reject-btn').onclick = () => { closeProofModal(); openRejectModal(regId); };
    document.getElementById('proof-modal-overlay').classList.add('open');
  }
  function closeProofModal() { document.getElementById('proof-modal-overlay').classList.remove('open'); }

  // Reject modal
  function openRejectModal(regId) {
    document.getElementById('reject-reg-id').value = regId;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal-overlay').classList.add('open');
  }
  function closeRejectModal() { document.getElementById('reject-modal-overlay').classList.remove('open'); }
  async function confirmReject() {
    const regId = document.getElementById('reject-reg-id').value;
    const reason = document.getElementById('reject-reason').value.trim();
    const reg = await DB.rejectPayment(regId, reason);
    if (reg) {
      showToast(`Pembayaran ${reg.name || reg.fullName} ditolak.`, 'warning');
      closeRejectModal();
      await applyFilters();
    }
  }

  (async function init() {
    await initFilters();
    await applyFilters();
  })();
</script>
</body>
</html>
